version: "3.9"

services:
  generation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobvault-generation-service
    restart: unless-stopped
    environment:
      PORT: "3000"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318/v1/traces"
    networks:
      - jobvault-internal
    # Not exposed externally — reached only by the Worker Service on the internal network
    expose:
      - "3000"

networks:
  jobvault-internal:
    external: true
